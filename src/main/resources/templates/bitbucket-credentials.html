<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitbucket Credentials</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="app-header">
    <div class="container">
        <h1>API Explorer</h1>
        <p class="subtitle">OpenShift · GitHub · Bitbucket</p>
    </div>
</header>
<main class="container">
    <section class="card">
        <div class="card-platform-badge badge-bitbucket">Bitbucket</div>
        <h2>Enter Credentials</h2>

        <div class="info-grid">
            <div><span class="label">Workspace</span><span th:text="${bitbucket.workspace}">sample_space_1</span></div>
            <div><span class="label">Repository</span><span th:text="${bitbucket.repoSlug}">repo_1</span></div>
        </div>

        <p class="hint">Enter your Bitbucket email and the App Password you just created.</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form method="post" th:action="@{/bitbucket/credentials}" class="form">
            <label for="email">Bitbucket Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="appPassword">App Password</label>
            <input id="appPassword" name="appPassword" type="password"
                   placeholder="ATBBxxxxxxxxxxxxxxxxx" required>

            <div class="actions">
                <button type="submit" class="btn btn-bb-primary">Connect &amp; Open Explorer</button>
                <a th:href="@{/bitbucket/login}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
