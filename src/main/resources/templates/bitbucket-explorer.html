<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitbucket Explorer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="app-header">
    <div class="container">
        <h1>Bitbucket Explorer</h1>
        <p class="subtitle">Browse Bitbucket API resources</p>
    </div>
</header>
<main class="container explorer">

    <!-- Session info -->
    <section class="card">
        <div class="info-grid">
            <div>
                <span class="label">Workspace</span>
                <span th:text="${bitbucket.workspace}">sample_space_1</span>
            </div>
            <div>
                <span class="label">Repository</span>
                <span th:text="${bitbucket.repoSlug}">repo_1</span>
            </div>
            <div>
                <span class="label">Email</span>
                <span class="mono" th:text="${bitbucket.email}">user@example.com</span>
            </div>
            <div>
                <span class="label">Connection Status</span>
                <span class="status-ok" th:if="${bitbucket.connected}">Connected</span>
                <span class="status-bad" th:unless="${bitbucket.connected}">Not connected</span>
            </div>
        </div>

        <form method="post" th:action="@{/bitbucket/disconnect}" class="inline-form">
            <button type="submit" class="btn btn-secondary btn-sm">Disconnect</button>
        </form>
    </section>

    <!-- API Endpoints -->
    <section class="card">
        <h2>API Endpoints</h2>
        <div class="endpoint-list">
            <div class="endpoint-row" th:each="resource : ${resources}">
                <div class="endpoint-info">
                    <strong th:text="${resource.label}">List Repositories</strong>
                    <code class="mono"
                          th:text="${resource.buildUrl(bitbucket.workspace, bitbucket.repoSlug, '')}">
                        https://api.bitbucket.org/2.0/...
                    </code>
                </div>

                <!-- BROWSE_FILE needs an extra path input inline -->
                <form th:if="${resource.requiresFilePath()}"
                      method="post"
                      th:action="@{/bitbucket/api/{name}(name=${resource.name()})}"
                      class="endpoint-form-file">
                    <input type="text" name="filePath"
                           th:value="${activeResource != null and activeResource == resource ? filePath : ''}"
                           placeholder="e.g. main/README.md"
                           class="file-path-input" required>
                    <button type="submit" class="btn btn-bb-primary btn-sm"
                            th:classappend="${activeResource != null and activeResource == resource} ? ' active' : ''">
                        Send
                    </button>
                </form>

                <form th:unless="${resource.requiresFilePath()}"
                      method="post"
                      th:action="@{/bitbucket/api/{name}(name=${resource.name()})}">
                    <button type="submit" class="btn btn-bb-primary btn-sm"
                            th:classappend="${activeResource != null and activeResource == resource} ? ' active' : ''">
                        Send
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Response -->
    <section class="card">
        <h2>Response</h2>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <pre class="response"
             th:text="${responseBody != null ? responseBody : 'Click Send on an endpoint to see the JSON response here.'}"></pre>
    </section>

</main>
</body>
</html>
