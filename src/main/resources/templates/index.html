<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="app-header">
    <div class="container">
        <h1>API Explorer</h1>
        <p class="subtitle">OpenShift · GitHub · Bitbucket</p>
    </div>
</header>
<main class="container">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="card">
        <h2>GitHub</h2>
        <p class="hint">Explore GitHub API endpoints and view JSON responses.</p>
        <div class="actions">
            <a th:href="@{/github/explorer}" class="btn btn-primary">Open GitHub Explorer</a>
            <a th:href="@{/github/login}" class="btn btn-secondary">Login with GitHub</a>
        </div>
    </section>

    <section class="card">
        <h2>OpenShift Connect</h2>
        <p class="hint">Enter your cluster name and namespace to begin.</p>

        <form method="post" th:action="@{/openshift/connect}" class="form">
            <label for="cluster">Cluster Name</label>
            <input id="cluster" name="cluster" type="text" placeholder="rm3" required>

            <label for="namespace">Namespace</label>
            <input id="namespace" name="namespace" type="text" placeholder="srivatchan-gv-dev" required>

            <button type="submit" class="btn btn-primary">Continue to OpenShift Login</button>
        </form>
    </section>
</main>
</body>
</html>
