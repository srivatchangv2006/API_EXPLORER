<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namespaces</title>
    <link rel="stylesheet" th:href="@{/css/ui.css}">
</head>
<body>
<header class="app-header">
    <div class="container">
        <h1>Projects / Namespaces</h1>
        <p class="subtitle" th:text="'Cluster: ' + ${cluster}">Cluster</p>
    </div>
</header>
<main class="container">
    <section class="card">
        <p class="hint">Showing OpenShift projects you have access to (via /apis/project.openshift.io/v1/projects).</p>
        <form method="post" th:action="@{/openshift-ui/disconnect}" class="inline-form">
            <button type="submit" class="btn btn-secondary btn-sm">Disconnect</button>
        </form>
    </section>
    <section class="card-grid">
        <a th:each="ns : ${namespaces}" th:href="@{/openshift-ui/namespaces/{name}(name=${ns})}" class="card-item">
            <h3 th:text="${ns}">namespace</h3>
            <p>View microservices</p>
        </a>
    </section>
    <section class="card" th:if="${#lists.isEmpty(namespaces)}">
        <p class="hint">No projects found for your account.</p>
    </section>
</main>
</body>
</html>
